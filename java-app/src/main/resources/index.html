<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Project - Prakash Pawar</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a73e8, #34a853);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 420px;
            animation: fadeIn 1.2s ease-in-out;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #34a853;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            background: #34a853;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        .details {
            text-align: left;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #5f6368;
        }
        .badge {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: bold;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Prakash Pawar</h1>
        <p class="status"><span class="status-dot"></span>System Operational</p>
        <div class="details">
            <p><strong>Artifact:</strong> <span class="badge">devops-project-1.0</span></p>
            <p><strong>Cloud:</strong> AWS EC2 (Mumbai)</p>
            <p><strong>Pipeline:</strong> Jenkins CI/CD</p>
            <p><strong>Tools:</strong> Docker, Kubernetes, Terraform, Ansible, GitHub Actions</p>
        </div>
    </div>
</body>
</html>
